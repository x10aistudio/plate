<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin:0; padding:0; }

html, body {
  width:100%;
  height:100%;
  background:#f3f4f6;
}

#win {
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
}

/* HEADER */
#head {
  background:#000;
  color:#fff;
  padding:16px 18px;
  font-weight:600;
  font-size:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* CHAT AREA */
#msgs {
  flex:1;
  padding:18px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* MESSAGE */
.msg {
  padding:12px 16px;
  border-radius:14px;
  font-size:14px;
  line-height:1.6;
  max-width:80%;
}

/* USER */
.user {
  background:#000;
  color:#fff;
  align-self:flex-end;
  border-bottom-right-radius:6px;
}

/* AI */
.ai {
  background:#e5e7eb;
  color:#111;
  align-self:flex-start;
  border-bottom-left-radius:6px;
}

/* INPUT */
#input-area {
  padding:14px;
  background:#fff;
  border-top:1px solid #e5e7eb;
  display:flex;
  gap:10px;
}

input#in {
  flex:1;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid #ddd;
  background:#f9fafb;
  font-size:14px;
  outline:none;
}

input#in:focus {
  background:#fff;
  border-color:#ccc;
}

/* BUTTON */
button#btn {
  background:#000;
  color:#fff;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

/* LOADING */
.dots {
  display:flex;
  gap:6px;
  padding:10px 14px;
  background:#e5e7eb;
  border-radius:14px;
}

.dot {
  width:8px;
  height:8px;
  background:#000;
  border-radius:50%;
  animation:bounce 1.4s infinite ease-in-out both;
}

@keyframes bounce {
  0%,80%,100%{ transform:scale(0.5); opacity:0.4;}
  40%{ transform:scale(1); opacity:1;}
}
</style>
</head>

<body>

<div id="win">

<div id="head">
  <span>Plate Assistant</span>
  <button onclick="window.parent.postMessage('close-chat','*')" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;">✕</button>
</div>

<div id="msgs">
  <div class="msg ai">
สวัสดีค่ะ ยินดีต้อนรับสู่ร้าน Plate ค่ะ  
สนใจจองโต๊ะหรือสอบถามเมนูอาหารดีคะ?
  </div>
</div>

<div id="input-area">
  <input id="in" placeholder="สอบถามเรื่องจองโต๊ะ..." autocomplete="off">
  <button id="btn">ส่ง</button>
</div>

</div>

<script>
const msgs = document.getElementById('msgs');
const input = document.getElementById('in');
const btn = document.getElementById('btn');

const PROXY = "https://restaurant-demo.heyweb.shop/api";

let chatHistory = [];

async function ask() {
  const text = input.value.trim();
  if (!text) return;

  appendMsg(text, 'user');
  input.value = '';
  const loader = showDots();

  chatHistory.push({ role: "user", parts: [{ text }] });

  try {
    const res = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ history: chatHistory })
    });

    const data = await res.json();
    loader.remove();

    const reply = data.text || "ขออภัยค่ะ ระบบขัดข้อง";
    appendMsg(reply, 'ai');

    chatHistory.push({ role: "model", parts: [{ text: reply }] });

  } catch (err) {
    loader.remove();
    appendMsg("ขออภัยค่ะ ระบบขัดข้อง", 'ai');
  }
}

function appendMsg(text, side) {
  const div = document.createElement('div');
  div.className = `msg ${side}`;

  let clean = text
    .replace(/RESERVATION_REQUEST:\s*true/gi, '')
    .replace(/MENU_CARDS:\s*\[.*?\]/gi, '')
    .trim();

  if (!clean && side === 'ai') return;

  div.innerText = clean;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showDots() {
  const d = document.createElement('div');
  d.className = 'dots';
  d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}

btn.onclick = ask;
input.onkeydown = (e) => { if (e.key === 'Enter') ask(); };
</script>

</body>
</html>
